# Streamlit theme for the RT Shift Scheduler  --  "Clinical teal".
#
# Goal: a calm, warm, clinical chrome for a stepped wizard that a non-technical
# charge RT drives unaided, and that looks polished enough to demo to department
# leadership. Everything here is a quiet neutral so the color-coded roster grid
# (green/blue/pink/amber from scheduler.WEB_COLORS) stays the most saturated thing
# on screen. A single deep-teal accent carries the primary action, the stepper's
# completed/current states, and links -- nothing else competes for it.
#
# Typography: Inter -- a clean, highly legible neutral sans that reads as
# trustworthy for an operational tool. Loaded from the Fontsource CDN below; if
# the network is unavailable it falls back gracefully to the system sans stack.

[theme]
base = "light"

# --- Core palette --------------------------------------------------------------
primaryColor = "#0E7569"               # deep teal -- ONLY the primary action, stepper, links
backgroundColor = "#FBFAF8"            # warm off-white canvas; the grid's pastels pop on it
secondaryBackgroundColor = "#F1F0EC"   # soft warm gray for sidebar surfaces and cards
textColor = "#1C2B2A"                  # deep warm ink
linkColor = "#0E7569"

# --- Typography ----------------------------------------------------------------
font = "Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
headingFont = "Inter, ui-sans-serif, system-ui, sans-serif"
codeFont = "ui-monospace, SFMono-Regular, Menlo, monospace"
baseFontSize = 15

# --- Shape + borders (gentle, restrained chrome) -------------------------------
baseRadius = "medium"
buttonRadius = "medium"
borderColor = "#E4E2DC"                # warm hairline borders
showSidebarBorder = true
showWidgetBorder = false               # keep inputs calm; lean on the warm surfaces
dataframeHeaderBackgroundColor = "#EDEBE4"   # light, quiet header so the COLORED cells lead
dataframeBorderColor = "#E4E2DC"

# --- Muted semantic colors, tuned for the warm neutrals ------------------------
# These tint st.success / st.error / st.info / st.warning and st.badge. Every one
# is intentionally desaturated and warm-leaning so it sits on the cream canvas
# without ever out-shouting the roster grid pastels (#C6EFCE / #BDD7EE / #FFC7CE
# / #FFE699), which remain the single most saturated element on screen.
greenColor = "#2E7A5A"
greenBackgroundColor = "#E8F1EB"
greenTextColor = "#1D5740"
redColor = "#B04A3C"
redBackgroundColor = "#F5EAE6"
redTextColor = "#8A2E22"
blueColor = "#2E6E86"
blueBackgroundColor = "#E7EEF1"
blueTextColor = "#234E60"
orangeColor = "#A66A22"
orangeBackgroundColor = "#F4EBDC"
orangeTextColor = "#794914"
yellowColor = "#877019"
yellowBackgroundColor = "#F3EEDB"
yellowTextColor = "#665209"

# --- Web fonts (Inter via the Fontsource CDN) ----------------------------------
[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-400-normal.woff2"
weight = 400
style = "normal"

[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-500-normal.woff2"
weight = 500
style = "normal"

[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-600-normal.woff2"
weight = 600
style = "normal"

[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-700-normal.woff2"
weight = 700
style = "normal"
